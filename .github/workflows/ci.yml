name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck CLI + installer
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          # -S warning: skip "info"-level findings (e.g. SC2086 word-splitting
          # for $PYON_THEMES, $PYON_FONTS positional-arg lists, and SC2015
          # `A && B || C` patterns where C is intentionally `true`/no-op).
          shellcheck -S warning cli/pyon install.sh

  template-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all placeholder tokens are known
        run: |
          set -euo pipefail
          known='__PYON_NAME__ __PYON_DISPLAY_NAME__ __PYON_NAMESPACE__ __PYON_DB__ __PYON_PORT_WEB__ __PYON_PORT_APP__ __PYON_PORT_API__ __PYON_PORT_DB__ __PYON_JWT_SECRET__ __PYON_GH_OWNER__ __PYON_YEAR__ __pyon_name__ __PYON_THEME__ __PYON_FONT_LINK__ __PYON_COPY_HERO_TITLE__ __PYON_COPY_HERO_SUB__ __PYON_COPY_HERO_CTA_PRIMARY__ __PYON_COPY_HERO_CTA_SECONDARY__ __PYON_COPY_FEATURE_1_TITLE__ __PYON_COPY_FEATURE_1_DESC__ __PYON_COPY_FEATURE_2_TITLE__ __PYON_COPY_FEATURE_2_DESC__ __PYON_COPY_FEATURE_3_TITLE__ __PYON_COPY_FEATURE_3_DESC__ __PYON_COPY_ABOUT_TITLE__ __PYON_COPY_ABOUT_BODY__ __PYON_COPY_ABOUT_VALUES_TITLE__ __PYON_COPY_ABOUT_VALUE_1__ __PYON_COPY_ABOUT_VALUE_2__ __PYON_COPY_ABOUT_VALUE_3__ __PYON_COPY_PRICING_TITLE__ __PYON_COPY_PRICING_SUB__ __PYON_COPY_PRICING_TIER_1_NAME__ __PYON_COPY_PRICING_TIER_1_PRICE__ __PYON_COPY_PRICING_TIER_1_FEATURE_1__ __PYON_COPY_PRICING_TIER_1_FEATURE_2__ __PYON_COPY_PRICING_TIER_2_NAME__ __PYON_COPY_PRICING_TIER_2_PRICE__ __PYON_COPY_PRICING_TIER_2_FEATURE_1__ __PYON_COPY_PRICING_TIER_2_FEATURE_2__ __PYON_COPY_PRICING_TIER_2_FEATURE_3__ __PYON_COPY_PRICING_TIER_3_NAME__ __PYON_COPY_PRICING_TIER_3_PRICE__ __PYON_COPY_PRICING_TIER_3_FEATURE_1__ __PYON_COPY_PRICING_TIER_3_FEATURE_2__ __PYON_COPY_PRICING_TIER_3_FEATURE_3__ __PYON_COPY_META_DESCRIPTION__ __PYON_COPY_FOOTER_TAGLINE__ __PYON_COPY_DASHBOARD_WELCOME__ __PYON_COPY_DASHBOARD_SUB__ __PYON_COPY_DASHBOARD_CARD_1_TITLE__ __PYON_COPY_DASHBOARD_CARD_1_DESC__ __PYON_COPY_DASHBOARD_CARD_1_BODY__ __PYON_COPY_DASHBOARD_CARD_2_TITLE__ __PYON_COPY_DASHBOARD_CARD_2_DESC__ __PYON_COPY_DASHBOARD_CARD_2_BODY__ __PYON_COPY_DASHBOARD_CARD_3_TITLE__ __PYON_COPY_DASHBOARD_CARD_3_DESC__ __PYON_COPY_SEED_POST_TITLE__ __PYON_COPY_SEED_POST_EXCERPT__ __PYON_COPY_SEED_POST_BODY__'
          found=$(grep -RohE '__(PYON|pyon)_[A-Z_a-z0-9]+__' \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=bin --exclude-dir=obj \
            --exclude-dir=themes --exclude-dir=palettes --exclude-dir=fonts \
            --exclude-dir=cli \
            . | sort -u)
          echo "Tokens found in template:"
          echo "$found"
          for t in $found; do
            case " $known " in
              *" $t "*) ;;
              *) echo "ERROR: unknown token $t — add to cli/pyon and CI allow-list"; exit 1 ;;
            esac
          done
