name: CLI smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scaffold-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout template (for local CLI run)
        uses: actions/checkout@v4
        with:
          path: pyon-stack

      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Scaffold demo project via pyon CLI (local mode)
        run: |
          set -euo pipefail
          chmod +x pyon-stack/cli/pyon
          PYON_TEMPLATE_DIR="$PWD/pyon-stack" pyon-stack/cli/pyon new demo \
            --yes \
            --display "Demo App" \
            --namespace Demo \
            --db demo_app \
            --port-web 3000 --port-app 5173 --port-api 5080 --port-db 5432 \
            --gh-owner demoorg

      - name: Build web + app
        working-directory: demo
        run: |
          pnpm install --no-frozen-lockfile
          pnpm -C apps/web build
          pnpm -C apps/app build

      - name: Build API
        working-directory: demo/apps/api
        run: |
          dotnet restore Demo.Api.sln
          dotnet build Demo.Api.sln -c Release --no-restore
